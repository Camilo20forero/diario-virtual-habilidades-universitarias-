<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diario - Habilidades Universitarias</title>

  <!-- Google Fonts: Space Grotesk para Títulos asombrosos, y Fira Code para el toque tech -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Space+Grotesk:wght@300;400;600;700&display=swap"
    rel="stylesheet">

  <!-- Import Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Encabezado Tema Oscuro -->
  <header class="sketchbook-header">
    <div class="header-content">
      <h1>// Diario.Virtual</h1>
      <p class="subtitle">Habilidades Universitarias [v2.0]</p>
    </div>
  </header>

  <main class="sketchbook-container">

    <!-- Controles -->
    <section class="controls">
      <div class="filter-group">
        <span class="filter-label">> filter_by:</span>
        <div id="tags-container" class="tags-container">
          <!-- Etiquetas generadas -->
          <button class="tag-btn active" data-tag="all">all</button>
        </div>
      </div>
    </section>

    <!-- Cuadrícula Neón -->
    <section id="entries-grid" class="entries-grid">
    </section>

  </main>

  <!-- Modal 3D -->
  <div id="model-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-modal" class="close-btn">&times;</button>
      <div id="modal-model-container" class="modal-model-container">
      </div>
      <div class="modal-text-container">
        <h2 id="modal-title" class="modal-title">Título</h2>
        <p id="modal-description" class="modal-description">Descripción</p>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
