# Flujo de trabajo sencillo para compilar y desplegar un sitio estático de Vite en GitHub Pages
name: Deploy static content to Pages

on:
  # Se ejecuta en cada push a la rama por defecto
  push:
    branches: ["master", "main"]

  # Te permite ejecutar este flujo de trabajo manualmente desde la pestaña de Acciones
  workflow_dispatch:

# Otorga permisos al GITHUB_TOKEN para permitir la publicación en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite una única implementación concurrente
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Trabajo de despliegue simple
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube los archivos de la carpeta dist de Vite
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
